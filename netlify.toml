[build]
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."ai"]
  external_node_modules = ["node-fetch"]
  timeout = 26

[functions."yahoo"]
  external_node_modules = ["imapflow", "mailparser", "nodemailer"]
  timeout = 26

[functions."zoom"]
  timeout = 26

[functions."zoom-check-background"]
  timeout = 26

[functions."book"]
  timeout = 26

[functions."m365"]
  timeout = 26

[functions."gmail"]
  timeout = 26

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "private, max-age=30, stale-while-revalidate=60"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
